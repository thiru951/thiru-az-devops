trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: tf-secrets

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.7'

- task: AzureCLI@2
  inputs:
    azureSubscription: 'terraform-sp'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Connected to Azure"

- script: terraform init
  displayName: Init

- script: terraform plan -var="admin_password=$(ADMIN_PASSWORD)" -out=tfplan
  displayName: Plan

- script: terraform apply -auto-approve tfplan
  displayName: Apply
