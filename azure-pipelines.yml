trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: kv-secrets

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.7'

- script: |
    terraform init
    terraform plan -var "vm_username=$(vm-username)" -var "vm_password=$(vm-password)"
    terraform apply -auto-approve -var "vm_username=$(vm-username)" -var "vm_password=$(vm-password)"
  displayName: Terraform Run
